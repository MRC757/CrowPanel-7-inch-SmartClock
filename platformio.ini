; Smart Clock - CrowPanel Advance 7" HMI ESP32-S3
; PlatformIO Project Configuration File

[env:crowpanel-7-smartclock]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; 16MB flash, OPI PSRAM
board_build.arduino.memory_type = qio_opi
board_build.arduino.partitions = default_8MB.csv
board_upload.flash_size = 8MB

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_MODE=1
    ; Tell LVGL to look for lv_conf.h in the include path
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    ; NOTE: CONFIG_LCD_RGB_BOUNCE_BUFFER_SIZE is a Kconfig option for the
    ; Espressif esp_lcd_panel_rgb driver. LovyanGFX uses its own GDMA setup
    ; (via Bus_RGB) and does NOT read this preprocessor define — the flag below
    ; has no runtime effect.  Touch jitter is instead managed by the 400 kHz I2C
    ; clock (Wire.setClock(400000)) and the horizontal blanking timing (40/48/40).
    -DCONFIG_LCD_RGB_BOUNCE_BUFFER_SIZE=20

lib_deps =
    lvgl/lvgl@8.3.11
    lovyan03/LovyanGFX@^1.2.0
    bblanchon/ArduinoJson@^6.21.5
